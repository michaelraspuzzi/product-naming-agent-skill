<!DOCTYPE html>
<!--
  product-naming flip-card deck — TEMPLATE
  Copy to output/, then replace CARDS, STUDIOS, PICKS, KICKER below with the run's data.
  Front shows ONLY the name. Click flips to reveal meaning + rating bars.
  Bars fill via pure CSS (scaleX keyed to .flip) to their exact % and glow in proportion
  to score (value/5): a 3/5 bar fills 60% and glows at 60%. Match the glow rgba() to accent if recolored.
  Below the deck, the "Explore by studio" grid lists each firm's shortlist as chips;
  chips whose name is in PICKS are highlighted as finalists.
  Layout: full-screen 2x2 first screen, studios scroll below; collapses to a stacked list on narrow screens.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Name Candidates</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#06060d;--ink:#f3f1ec;--muted:#82869c;--line:rgba(255,255,255,.07)}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;color:var(--ink);font-family:"Hanken Grotesk",system-ui,sans-serif;
    background:radial-gradient(900px 600px at 8% -8%,#1a1d44 0,transparent 55%),
      radial-gradient(900px 700px at 108% 4%,#3a1840 0,transparent 52%),#06060d;}
  .top{padding:22px 38px 14px;display:flex;align-items:baseline;justify-content:space-between;gap:20px}
  .kicker{font-size:11.5px;letter-spacing:.34em;text-transform:uppercase;color:var(--muted)}
  .legend{font-size:11.5px;color:var(--muted);display:flex;gap:16px}
  .legend span{display:flex;align-items:center;gap:6px}
  .dot{width:7px;height:7px;border-radius:50%}
  .clear{background:#5ce6a8}.caution{background:#f0c84b}.contested{background:#f0726e}
  .deck{height:calc(100vh - 76px);min-height:520px;display:grid;grid-template-columns:1fr 1fr;
    grid-template-rows:1fr 1fr;gap:22px;padding:0 38px 28px}
  .scene{perspective:2000px;min-height:0}
  .card{position:relative;height:100%;width:100%;transform-style:preserve-3d;
    transition:transform .9s cubic-bezier(.2,.85,.2,1);cursor:pointer}
  .card.flip{transform:rotateY(180deg)} .scene:hover .card:not(.flip){transform:translateY(-5px)}
  .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border-radius:20px;overflow:hidden;border:1px solid var(--line);
    background:linear-gradient(158deg,rgba(255,255,255,.085),rgba(255,255,255,.015));
    box-shadow:0 34px 70px -34px rgba(0,0,0,.85),inset 0 1px 0 rgba(255,255,255,.10);backdrop-filter:blur(8px)}
  .front{display:flex;align-items:center;justify-content:center;padding:34px}
  .glow{position:absolute;inset:0;opacity:.5;pointer-events:none;background:radial-gradient(70% 120% at 78% 12%,var(--c)44,transparent 62%)}
  .rankwm{position:absolute;left:24px;bottom:6px;font-family:"Instrument Serif",serif;font-size:118px;line-height:1;color:rgba(255,255,255,.05)}
  .name{font-family:"Instrument Serif",serif;font-size:clamp(40px,5.4vw,76px);line-height:1;letter-spacing:-.01em;text-align:center;position:relative;z-index:2}
  .hint{position:absolute;right:20px;bottom:16px;font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);opacity:.65}
  .back{transform:rotateY(180deg);display:grid;grid-template-columns:1.05fr 1fr;gap:26px;padding:26px 28px}
  .bL{display:flex;flex-direction:column;min-width:0}
  .bhead{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:12px}
  .bname{font-family:"Instrument Serif",serif;font-size:30px;line-height:1}
  .bscore{font-family:"Instrument Serif",serif;font-size:28px;color:var(--c)}
  .embed{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .meaning{font-size:13.5px;line-height:1.58;color:#e3e1da;margin:0}
  .verdict{margin-top:auto;padding-top:14px;font-size:12px;line-height:1.45;color:#cdd0e6}
  .verdict .dot{display:inline-block;margin-right:7px;vertical-align:middle}
  .bR{display:flex;flex-direction:column;justify-content:center;gap:15px;border-left:1px solid var(--line);padding-left:24px}
  .rrow{display:flex;flex-direction:column;gap:5px}
  .rtop{display:flex;justify-content:space-between;align-items:baseline;font-size:12px}
  .rlab{color:var(--muted)} .rval{font-family:"Instrument Serif",serif;font-size:17px;color:var(--c)}
  .track{height:9px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden}
  .fill{height:100%;border-radius:99px;width:var(--w);transform:scaleX(0);transform-origin:left center;
    transition:transform .95s cubic-bezier(.2,.85,.2,1);background:linear-gradient(90deg,var(--c),#fff6df)}
  .card.flip .fill{transform:scaleX(1)}
  .studios{padding:8px 38px 64px}
  .shead{font-size:11.5px;letter-spacing:.34em;text-transform:uppercase;color:var(--muted);margin:26px 0 18px;display:flex;align-items:center;gap:12px}
  .shead::after{content:"";flex:1;height:1px;background:var(--line)}
  .sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(255px,1fr));gap:18px}
  .studio{border:1px solid var(--line);border-radius:16px;padding:18px;background:linear-gradient(158deg,rgba(255,255,255,.05),rgba(255,255,255,.012))}
  .studio h4{font-family:"Instrument Serif",serif;font-weight:400;font-size:23px;margin:0;color:var(--c)}
  .studio .tag{font-size:11.5px;color:var(--muted);margin:3px 0 13px;line-height:1.45}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{font-size:12.5px;padding:5px 11px;border-radius:99px;border:1px solid var(--line);color:#d7d9ea;background:rgba(255,255,255,.03);transition:.2s}
  .chip:hover{border-color:var(--c);color:#fff;background:rgba(255,255,255,.08);transform:translateY(-1px)}
  .chip.pick{border-color:var(--c);color:var(--c);box-shadow:0 0 14px -2px var(--c)}
  @media (max-width:880px){.top{flex-direction:column;gap:8px}
    .deck{height:auto;min-height:0;grid-template-columns:1fr;grid-template-rows:none;gap:18px;padding:0 18px 26px}
    .scene{aspect-ratio:16/8.6}.studios{padding-left:18px;padding-right:18px}.name{font-size:clamp(38px,11vw,62px)}}
  @media (max-width:520px){.back{grid-template-columns:1fr;gap:14px;overflow:auto}
    .bR{border-left:none;border-top:1px solid var(--line);padding-left:0;padding-top:14px}.scene{aspect-ratio:3/4.1}}
</style>
</head>
<body>
  <div class="top">
    <span class="kicker" id="kicker">Product Naming · Ranked Shortlist</span>
    <span class="legend"><span><i class="dot clear"></i>Clear</span><span><i class="dot caution"></i>Caution</span><span><i class="dot contested"></i>Contested</span></span>
  </div>
  <main class="deck" id="deck"></main>
  <section class="studios"><div class="shead">Explore by studio</div><div class="sgrid" id="studios"></div></section>
<script>
  // ---- REPLACE THIS DATA PER RUN ----
  const KICKER = "Product Naming · Ranked Shortlist";
  const PICKS = ["Example"]; // names that made the top cards (highlighted in studio chips)
  const CARDS = [
    { rank:1, name:"Example", embed:"embeds · root", score:88, verdict:"clear", c:"#e7c873",
      meaning:"What the word means and why it fits the strategy.",
      verdictText:"Availability note + caveat.",
      ratings:[{label:"Meaning",value:5},{label:"Distinctiveness",value:5},{label:"Sound",value:4},{label:"Say & spell",value:3},{label:"Availability",value:5}] }
  ];
  const STUDIOS = [
    { name:"Lexicon", c:"#e7c873", tag:"Sound symbolism · invented · name the experience", names:["Example"] },
    { name:"Catchword", c:"#9ad0f5", tag:"Vocabulary + volume · storytelling · global", names:[] },
    { name:"Tanj", c:"#c9a8f0", tag:"Strategy-first · real-word mapping · anti-trend", names:[] },
    { name:"Landor", c:"#f0a98f", tag:"Positioning-first · 8 principles · elastic", names:[] },
    { name:"Igor", c:"#8fe6c0", tag:"Evocative-or-bust · provocations · open quadrant", names:[] },
    { name:"Essence", c:"#f0c84b", tag:"On-the-nose baseline · verbs + feelings", names:[] }
  ];
  // -----------------------------------
  document.getElementById('kicker').textContent = KICKER;
  const fmt = v => v % 1 ? v.toFixed(1) : String(v);
  const deck=document.getElementById('deck');
  CARDS.forEach(c=>{
    const scene=document.createElement('div'); scene.className='scene';
    const bars=c.ratings.map(r=>{const p=r.value/5;
      return `<div class="rrow"><div class="rtop"><span class="rlab">${r.label}</span>
        <span class="rval">${fmt(r.value)}</span></div>
        <div class="track"><span class="fill" style="--w:${(p*100).toFixed(0)}%;
          box-shadow:0 0 ${(p*26).toFixed(0)}px rgba(231,200,115,${p.toFixed(2)})"></span></div></div>`;}).join('');
    scene.innerHTML=`
      <div class="card" style="--c:${c.c}">
        <div class="face front"><div class="glow"></div><div class="rankwm">${c.rank}</div>
          <div class="name">${c.name}</div><div class="hint">↻ tap</div></div>
        <div class="face back">
          <div class="bL"><div class="bhead"><span class="bname">${c.name}</span><span class="bscore">${c.score}</span></div>
            <div class="embed">${c.embed}</div><p class="meaning">${c.meaning}</p>
            <div class="verdict"><i class="dot ${c.verdict}"></i>${c.verdictText}</div></div>
          <div class="bR">${bars}</div></div>
      </div>`;
    deck.appendChild(scene);
    const card=scene.querySelector('.card');
    card.addEventListener('click',()=>card.classList.toggle('flip'));
  });
  const studios=document.getElementById('studios');
  STUDIOS.forEach(s=>{
    const chips=s.names.map(n=>`<span class="chip${PICKS.includes(n)?' pick':''}">${n}</span>`).join('');
    const el=document.createElement('div'); el.className='studio'; el.style.setProperty('--c',s.c);
    el.innerHTML=`<h4>${s.name}</h4><div class="tag">${s.tag}</div><div class="chips">${chips}</div>`;
    studios.appendChild(el);
  });
</script>
</body>
</html>

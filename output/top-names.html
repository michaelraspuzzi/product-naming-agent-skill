<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cert-Prep Tutor — Top Names</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#06060d;--ink:#f3f1ec;--muted:#82869c;--line:rgba(255,255,255,.07)}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;color:var(--ink);font-family:"Hanken Grotesk",system-ui,sans-serif;
    background:radial-gradient(900px 600px at 8% -8%,#1a1d44 0,transparent 55%),
      radial-gradient(900px 700px at 108% 4%,#3a1840 0,transparent 52%),#06060d;}
  .top{padding:22px 38px 14px;display:flex;align-items:baseline;justify-content:space-between;gap:20px}
  .kicker{font-size:11.5px;letter-spacing:.34em;text-transform:uppercase;color:var(--muted)}
  .legend{font-size:11.5px;color:var(--muted);display:flex;gap:16px}
  .legend span{display:flex;align-items:center;gap:6px}
  .dot{width:7px;height:7px;border-radius:50%}
  .clear{background:#5ce6a8}.caution{background:#f0c84b}.contested{background:#f0726e}

  .deck{height:calc(100vh - 76px);min-height:520px;display:grid;grid-template-columns:1fr 1fr;
    grid-template-rows:1fr 1fr;gap:22px;padding:0 38px 28px}
  .scene{perspective:2000px;min-height:0}
  .card{position:relative;height:100%;width:100%;transform-style:preserve-3d;
    transition:transform .9s cubic-bezier(.2,.85,.2,1);cursor:pointer}
  .card.flip{transform:rotateY(180deg)}
  .scene:hover .card:not(.flip){transform:translateY(-5px)}
  .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border-radius:20px;overflow:hidden;border:1px solid var(--line);
    background:linear-gradient(158deg,rgba(255,255,255,.085),rgba(255,255,255,.015));
    box-shadow:0 34px 70px -34px rgba(0,0,0,.85),inset 0 1px 0 rgba(255,255,255,.10);backdrop-filter:blur(8px)}
  .front{display:flex;align-items:center;justify-content:center;padding:34px}
  .glow{position:absolute;inset:0;opacity:.5;pointer-events:none;
    background:radial-gradient(70% 120% at 78% 12%,var(--c)44,transparent 62%)}
  .rankwm{position:absolute;left:24px;bottom:6px;font-family:"Instrument Serif",serif;font-size:118px;line-height:1;color:rgba(255,255,255,.05)}
  .name{font-family:"Instrument Serif",serif;font-size:clamp(40px,5.4vw,76px);line-height:1;letter-spacing:-.01em;text-align:center;position:relative;z-index:2}
  .hint{position:absolute;right:20px;bottom:16px;font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);opacity:.65}

  .back{transform:rotateY(180deg);display:grid;grid-template-columns:1.05fr 1fr;gap:26px;padding:26px 28px}
  .bL{display:flex;flex-direction:column;min-width:0}
  .bhead{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:12px}
  .bname{font-family:"Instrument Serif",serif;font-size:30px;line-height:1}
  .bscore{font-family:"Instrument Serif",serif;font-size:28px;color:var(--c)}
  .embed{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .meaning{font-size:13.5px;line-height:1.58;color:#e3e1da;margin:0}
  .verdict{margin-top:auto;padding-top:14px;font-size:12px;line-height:1.45;color:#cdd0e6}
  .verdict .dot{display:inline-block;margin-right:7px;vertical-align:middle}
  .bR{display:flex;flex-direction:column;justify-content:center;gap:15px;border-left:1px solid var(--line);padding-left:24px}
  .rrow{display:flex;flex-direction:column;gap:5px}
  .rtop{display:flex;justify-content:space-between;align-items:baseline;font-size:12px}
  .rlab{color:var(--muted);letter-spacing:.02em}
  .rval{font-family:"Instrument Serif",serif;font-size:17px;color:var(--c)}
  .track{height:9px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden}
  .fill{height:100%;border-radius:99px;width:var(--w);background:linear-gradient(90deg,var(--c),#fff6df)}

  /* studio explorer */
  .studios{padding:8px 38px 64px}
  .shead{font-size:11.5px;letter-spacing:.34em;text-transform:uppercase;color:var(--muted);margin:26px 0 18px;
    display:flex;align-items:center;gap:12px}
  .shead::after{content:"";flex:1;height:1px;background:var(--line)}
  .sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(255px,1fr));gap:14px;align-items:start}
  .studio{border:1px solid var(--line);border-radius:16px;
    background:linear-gradient(158deg,rgba(255,255,255,.05),rgba(255,255,255,.012))}
  .studio>summary{list-style:none;cursor:pointer;padding:15px 18px;display:flex;align-items:center;
    justify-content:space-between;gap:12px;transition:.2s}
  .studio>summary::-webkit-details-marker{display:none}
  .studio>summary:hover{background:rgba(255,255,255,.03)}
  .sname{display:flex;align-items:center;gap:10px;min-width:0}
  .caret{color:var(--muted);font-size:13px;transition:transform .2s}
  .studio[open] .caret{transform:rotate(90deg)}
  .studio h4{font-family:"Instrument Serif",serif;font-weight:400;font-size:22px;margin:0;color:var(--c)}
  .scount{font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:99px;padding:2px 9px;flex:none}
  .studio .tag{font-size:11.5px;color:var(--muted);margin:0;padding:0 18px;line-height:1.45}
  .chips{display:flex;flex-wrap:wrap;gap:7px;padding:12px 18px 18px}
  .chip{font-size:12.5px;padding:5px 11px;border-radius:99px;border:1px solid var(--line);
    color:#d7d9ea;background:rgba(255,255,255,.03);transition:.2s}
  .chip:hover{border-color:var(--c);color:#fff;background:rgba(255,255,255,.08);transform:translateY(-1px)}
  .chip.pick{border-color:var(--c);color:var(--c);box-shadow:0 0 14px -2px var(--c)}

  @media (max-width:880px){
    .top{flex-direction:column;gap:8px}
    .deck{height:auto;min-height:0;grid-template-columns:1fr;grid-template-rows:none;gap:18px;padding:0 18px 26px}
    .scene{aspect-ratio:16/8.6}
    .studios{padding-left:18px;padding-right:18px}
    .name{font-size:clamp(38px,11vw,62px)}
  }
  @media (max-width:520px){
    .back{grid-template-columns:1fr;gap:14px;overflow:auto}
    .bR{border-left:none;border-top:1px solid var(--line);padding-left:0;padding-top:14px}
    .scene{aspect-ratio:3/4.1}
  }
</style>
</head>
<body>
  <div class="top">
    <span class="kicker">Cert-Prep AI Tutor · Ranked Shortlist</span>
    <span class="legend"><span><i class="dot clear"></i>Clear</span><span><i class="dot caution"></i>Caution</span><span><i class="dot contested"></i>Contested</span></span>
  </div>
  <main class="deck" id="deck"></main>

  <section class="studios">
    <div class="shead">Explore by studio</div>
    <div class="sgrid" id="studios"></div>
  </section>

<script>
  const PICKS = ["En Passant","Certo","Passage","Certify"];

  const CARDS = [
    { rank:1, name:"En Passant", embed:"embeds · pass", score:88, verdict:"clear", c:"#e7c873",
      meaning:"French for “in passing” — chess’s advanced, almost-secret capture that only players who truly know the game ever use. It names the calm of someone who clears the exam in stride, and hides “pass” in plain sight. Wide-open evocative quadrant, zero edtech/cyber clash.",
      verdictText:"Clear — the only genuinely open name. No assessment/training/security collision. Verify enpassant.com / .ai.",
      ratings:[{label:"Meaning",value:5},{label:"Distinctiveness",value:5},{label:"Sound",value:4},{label:"Say & spell",value:2.5},{label:"Availability",value:5}] },

    { rank:2, name:"Certo", embed:"embeds · cert", score:82, verdict:"caution", c:"#9ad0f5",
      meaning:"Italian for “certainly, of course” — the one word a confident person says when there’s no doubt left, the exact feeling of mastery, with “cert” hidden inside. Short, premium, flawless CVCV that pronounces cleanly worldwide and scales past exams.",
      verdictText:"Caution — a UK cybersecurity firm (Certo) shares your CISSP audience. Clear it with a twist: Certoly, Certo Labs, certo.ai.",
      ratings:[{label:"Meaning",value:4.5},{label:"Distinctiveness",value:3.5},{label:"Sound",value:4.5},{label:"Say & spell",value:4.5},{label:"Availability",value:3}] },

    { rank:3, name:"Passage", embed:"embeds · pass", score:78, verdict:"caution", c:"#c9a8f0",
      meaning:"A rite of passage — the threshold you cross from candidate to certified — and also a “passage” of text you study. Warm, globally legible, and it reframes a brutal exam as transformation, not testing. Embeds “pass” without reading as a label.",
      verdictText:"Caution / opening — 1Password retired its “Passage” auth product (Jan 2026), so passage.ai is currently unregistered. Watch the mark lapse; PassagePrep as fallback.",
      ratings:[{label:"Meaning",value:4.5},{label:"Distinctiveness",value:3},{label:"Sound",value:3.5},{label:"Say & spell",value:4.5},{label:"Availability",value:3.5}] },

    { rank:4, name:"Certify", embed:"essence baseline", score:64, verdict:"contested", c:"#8fe6c0",
      meaning:"The literal verb — to formally confirm proven competence. The most obvious word in the category, and exactly the one the new Essence Pass guarantees you always consider. Maximum clarity, instant recognition — but that’s its ceiling: generic, so weak to trademark and impossible to own. The floor every distinctive name must beat.",
      verdictText:"Contested — certify.com is taken, Emburse Certify is established, and a bare descriptive verb is hard to register. Use only inside a coined/compound twist.",
      ratings:[{label:"Meaning",value:5},{label:"Distinctiveness",value:1.5},{label:"Sound",value:3},{label:"Say & spell",value:5},{label:"Availability",value:1.5}] }
  ];

  const STUDIOS = [
    { name:"Lexicon", c:"#e7c873", tag:"Sound symbolism · invented words · name the experience",
      names:["Stropp","Keend","Aciem","Brink","Tactus","Certo","Honos","Verdic"] },
    { name:"Catchword", c:"#9ad0f5", tag:"Vocabulary + volume · storytelling · globally pronounceable",
      names:["Certa","Certo","Summa","Acumen","Compass","Passage","Certain","Vetto"] },
    { name:"Tanj", c:"#c9a8f0", tag:"Strategy-first · map a real word onto the truth · anti-trend",
      names:["Hone","Keen","Mettle","Temper","Compass","Passkey","Certitude","Adept"] },
    { name:"Landor", c:"#f0a98f", tag:"Positioning-first · 8 principles · elastic & systemic",
      names:["Hone","Forte","Proof","Lodestar","Whetline","Crucible","Passage","Aegis"] },
    { name:"Igor", c:"#8fe6c0", tag:"Evocative-or-bust · provocations · find the open quadrant",
      names:["En Passant","Forge","Crucible","Compass","Concerto","Quench","Passkey","Certain"] },
    { name:"Essence", c:"#f0c84b", tag:"The on-the-nose baseline · core verbs + feelings",
      names:["Certify","Pass","Prove","Master","Ace","Qualify","Ready","Certain"] }
  ];

  // each rating dimension gets its own color so the bars read at a glance
  const SKILL_COLORS = {
    "Meaning":"#e7c873", "Distinctiveness":"#9ad0f5", "Sound":"#c9a8f0",
    "Say & spell":"#f0a98f", "Availability":"#8fe6c0"
  };
  const alphaHex = a => Math.round(Math.max(0,Math.min(1,a))*255).toString(16).padStart(2,'0');
  const fmt = v => v % 1 ? v.toFixed(1) : String(v);
  const deck = document.getElementById('deck');
  CARDS.forEach(c=>{
    const scene=document.createElement('div'); scene.className='scene';
    const bars=c.ratings.map(r=>{const p=r.value/5; const col=SKILL_COLORS[r.label]||c.c;
      return `<div class="rrow"><div class="rtop"><span class="rlab">${r.label}</span>
        <span class="rval" style="color:${col}">${fmt(r.value)}</span></div>
        <div class="track"><span class="fill" style="--w:${(p*100).toFixed(0)}%;
          background:linear-gradient(90deg,${col},#fff6df);
          box-shadow:0 0 ${(p*26).toFixed(0)}px ${col}${alphaHex(p)}"></span></div></div>`;}).join('');
    scene.innerHTML=`
      <div class="card" style="--c:${c.c}">
        <div class="face front"><div class="glow"></div><div class="rankwm">${c.rank}</div>
          <div class="name">${c.name}</div><div class="hint">↻ tap</div></div>
        <div class="face back">
          <div class="bL"><div class="bhead"><span class="bname">${c.name}</span><span class="bscore">${c.score}</span></div>
            <div class="embed">${c.embed}</div><p class="meaning">${c.meaning}</p>
            <div class="verdict"><i class="dot ${c.verdict}"></i>${c.verdictText}</div></div>
          <div class="bR">${bars}</div></div>
      </div>`;
    deck.appendChild(scene);
    const card=scene.querySelector('.card');
    card.addEventListener('click',()=>card.classList.toggle('flip'));
  });

  const studios=document.getElementById('studios');
  STUDIOS.forEach(s=>{
    const chips=s.names.map(n=>`<span class="chip${PICKS.includes(n)?' pick':''}">${n}</span>`).join('');
    const el=document.createElement('details'); el.className='studio'; el.style.setProperty('--c',s.c);
    el.innerHTML=`<summary><span class="sname"><span class="caret">▸</span><h4>${s.name}</h4></span><span class="scount">${s.names.length}</span></summary><div class="tag">${s.tag}</div><div class="chips">${chips}</div>`;
    studios.appendChild(el);
  });
</script>
</body>
</html>
